                    <div class="space-y-4 overflow-y-auto custom-scrollbar pr-3 pb-4 flex-1">
                        {items.length === 0 && (
                            <div class="h-full flex items-center justify-center opacity-30 text-sm font-medium border-2 border-dashed border-white/20 rounded-2xl">
                                Área vazia
                            </div>
                        )}
                        {items.map(p => (
                            <div key={p.id} class="bg-white/5 backdrop-blur-md p-5 rounded-2xl border border-white/10 relative group animate-slide-up hover:bg-white/10 hover:border-white/20 transition-all hover:shadow-[0_8px_30px_rgba(0,0,0,0.4)]">
                                <p class="font-medium text-white/90 text-sm leading-relaxed mb-3">{p.text}</p>
                                {p.scripture && <p class="text-[11px] font-bold text-futuristic-secondary mb-2 inline-flex items-center gap-1.5"><i class="fa-solid fa-book-open opacity-70"></i> {p.scripture}</p>}
                                <div class="text-[10px] text-white/40 font-semibold tracking-widest uppercase flex items-center gap-2">
                                    <div class="w-1 h-1 rounded-full bg-white/30"></div> Por {getTeamName(p.teamId)}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            // Estado Global - Firebase e Auth
            const [firebaseLoaded, setFirebaseLoaded] = useState(!!window.firebaseDB);
            const [userUid, setUserUid] = useState(null);
            
            // Estado Global da Sala Online
            const [roomId, setRoomId] = useState('');
            const [inRoom, setInRoom] = useState(false);
            const [roomHostUid, setRoomHostUid] = useState(null);
            
            // Estado do Jogo (Sincronizado)
            const [gameState, setGameState] = useState('intro');
            const [teams, setTeams] = useState([{ id: generateId(), name: 'Equipe 1' }, { id: generateId(), name: 'Equipe 2' }]);
            const [currentQuestion, setCurrentQuestion] = useState('');
            const [currentCategory, setCurrentCategory] = useState(null);
            const [availableQuestions, setAvailableQuestions] = useState([...ALL_QUESTIONS]);
            const [principles, setPrinciples] = useState([]);
            const [timer, setTimer] = useState(180);
            const [timerEndsAt, setTimerEndsAt] = useState(null);
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [activePrinciple, setActivePrinciple] = useState(null);

            // Estado Local da Interface
            const [localTimer, setLocalTimer] = useState(180);
            const [selectedCategoryFilter, setSelectedCategoryFilter] = useState('all');
            const [questionInputMode, setQuestionInputMode] = useState('draw');
            const [principleText, setPrincipleText] = useState('');
            const [scriptureText, setScriptureText] = useState('');
            const [selectedTeamId, setSelectedTeamId] = useState('');
            const [message, setMessage] = useState(null);
            const [joinCode, setJoinCode] = useState('');
            const [joinName, setJoinName] = useState('');
            const [isJoiningRoom, setIsJoiningRoom] = useState(false);

            // Verifica se o usuário atual é o Host
            const isHost = !inRoom || roomHostUid === userUid;

            const showMessage = (msg, type = 'error') => {
                setMessage({ text: msg, type });
                setTimeout(() => setMessage(null), 4000);
            };

            // EFEITO 1: Carregamento do Firebase SDK
            useEffect(() => {
                if (!firebaseLoaded) {
                    const handleLoad = () => setFirebaseLoaded(true);
                    window.addEventListener('firebase-loaded', handleLoad);
                    return () => window.removeEventListener('firebase-loaded', handleLoad);
                }
            }, [firebaseLoaded]);

            // EFEITO 2: Login Anônimo (Necessário para Firestore Rules)
            useEffect(() => {
                if (!firebaseLoaded) return;
                const { signInAnonymously, onAuthStateChanged } = window.firebaseAPI;
                const auth = window.firebaseAuth;

                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (error) {
                        console.error("Auth Error:", error);
                        // Tratamento de Erro Específico: Configuração não encontrada no Console
                        if (error.code?.includes('configuration-not-found') || error.message?.includes('configuration-not-found') || error.code === 'auth/operation-not-allowed') {
                            showMessage("Aviso Firebase: Ative o 'Login Anônimo' no painel de Autenticação do seu Firebase para jogar online.", "warning");
                        } else {
                            showMessage("Falha na conexão online. O modo local continua disponível.", "error");
                        }
                    }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, (user) => {
                    if (user) setUserUid(user.uid);
                });
                return () => unsubscribe();
            }, [firebaseLoaded]);

            // EFEITO 3: Escuta em Tempo Real do Firestore (Multiplayer)
            useEffect(() => {
                if (!inRoom || !roomId || !firebaseLoaded) return;
                const { doc, onSnapshot } = window.firebaseAPI;
                const db = window.firebaseDB;

                const roomRef = doc(db, 'rooms', roomId);
                const unsub = onSnapshot(roomRef, (document) => {
                    if (document.exists()) {
                        const data = document.data();
                        if (data.host) setRoomHostUid(data.host);
                        if (data.gameState) setGameState(data.gameState);
                        if (data.teams) setTeams(data.teams);
                        if (data.currentQuestion !== undefined) setCurrentQuestion(data.currentQuestion);
                        if (data.currentCategory !== undefined) setCurrentCategory(data.currentCategory);
                        if (data.principles) setPrinciples(data.principles);
                        if (data.activePrinciple !== undefined) setActivePrinciple(data.activePrinciple);
                        if (data.timerEndsAt !== undefined) setTimerEndsAt(data.timerEndsAt);
                        if (data.timer !== undefined) setTimer(data.timer);
                        if (data.isTimerRunning !== undefined) setIsTimerRunning(data.isTimerRunning);
                        if (data.availableQuestions) setAvailableQuestions(data.availableQuestions);
                    } else {
                        // Sala foi excluída
                        setInRoom(false);
                        setGameState('intro');
                        showMessage("A sala foi encerrada.", "warning");
                    }
                }, (error) => {
                    console.error("Sync error:", error);
                });
                return () => unsub();
            }, [inRoom, roomId, firebaseLoaded]);

            // EFEITO 4: Timer Local Inteligente
            useEffect(() => {
                let interval = null;
                if (isTimerRunning && timerEndsAt) {
                    interval = setInterval(() => {
                        const remaining = Math.max(0, Math.floor((timerEndsAt - Date.now()) / 1000));
                        setLocalTimer(remaining);
                        if (remaining === 0) {
                            setIsTimerRunning(false); 
                        }
                    }, 1000);
                } else {
                    setLocalTimer(timer);
                }
                return () => clearInterval(interval);
            }, [isTimerRunning, timerEndsAt, timer]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            };

            // Função Central de Sincronização (Com fallback Local Inteligente)
            const syncUpdate = async (updates) => {
                // FALLBACK LOCAL: Se não estiver em sala, atualiza os estados localmente (permite jogar offline perfeitamente)
                if (!inRoom || !roomId || !firebaseLoaded) {
                    if (updates.gameState) setGameState(updates.gameState);
                    if (updates.teams) setTeams(updates.teams);
                    if (updates.currentQuestion !== undefined) setCurrentQuestion(updates.currentQuestion);
                    if (updates.currentCategory !== undefined) setCurrentCategory(updates.currentCategory);
                    if (updates.principles) setPrinciples(updates.principles);
                    if (updates.activePrinciple !== undefined) setActivePrinciple(updates.activePrinciple);
                    if (updates.timerEndsAt !== undefined) setTimerEndsAt(updates.timerEndsAt);
                    if (updates.timer !== undefined) setTimer(updates.timer);
                    if (updates.isTimerRunning !== undefined) setIsTimerRunning(updates.isTimerRunning);
                    if (updates.availableQuestions) setAvailableQuestions(updates.availableQuestions);
                    return;
                }
                
                // MODO ONLINE
                try {
                    const { doc, updateDoc } = window.firebaseAPI;
                    const roomRef = doc(window.firebaseDB, 'rooms', roomId);
                    await updateDoc(roomRef, updates);
                } catch (e) {
                    console.error("Error updating room:", e);
                }
            };

            const toggleTimer = () => {
                if (isTimerRunning) {
                    syncUpdate({ isTimerRunning: false, timer: localTimer });
                } else {
                    syncUpdate({ isTimerRunning: true, timerEndsAt: Date.now() + localTimer * 1000 });
                }
            };

            // Lógica Multiplayer: Criar/Entrar Sala
            const createRoom = async () => {
                if (!userUid || !firebaseLoaded) {
                    showMessage("Aguarde a conexão com Firebase ou use o modo Local.", "warning");
                    return;
                }
                const newRoomId = Math.random().toString(36).substring(2, 7).toUpperCase();
                try {
                    const { doc, setDoc } = window.firebaseAPI;
                    const roomRef = doc(window.firebaseDB, 'rooms', newRoomId);
                    await setDoc(roomRef, {
                        host: userUid,
                        gameState: 'setup_teams',
                        teams: [{ id: generateId(), name: 'Equipe 1' }, { id: generateId(), name: 'Equipe 2' }],
                        currentQuestion: '',
                        currentCategory: null,
                        availableQuestions: ALL_QUESTIONS,
                        principles: [],
                        timer: 180,
                        isTimerRunning: false,
                        activePrinciple: null
                    });
                    setRoomId(newRoomId);
                    setInRoom(true);
                } catch (e) {
                    showMessage("Erro ao criar sala. Verifique a internet e as configurações do Firebase.", "error");
                }
            };

            const joinRoom = async (code, name) => {
                if (!code || !name) {
                    showMessage("Preencha seu nome e o código da sala.", "warning");
                    return;
                }
                if (!userUid || !firebaseLoaded) return;
                const roomCode = code.toUpperCase();
                try {
                    const { doc, getDoc, updateDoc } = window.firebaseAPI;
                    const roomRef = doc(window.firebaseDB, 'rooms', roomCode);
                    const docSnap = await getDoc(roomRef);
                    if (docSnap.exists()) {
                        const roomData = docSnap.data();
                        // Adiciona o jogador à lista se ainda não estiver
                        const existingTeams = roomData.teams || [];
                        const alreadyIn = existingTeams.some(t => t.id === userUid);
                        if (!alreadyIn) {
                            const newTeams = [...existingTeams, { id: userUid, name: name }];
                            await updateDoc(roomRef, { teams: newTeams });
                        }
                        setRoomId(roomCode);
                        setInRoom(true);
                    } else {
                        showMessage('Sala não encontrada!', 'error');
                    }
                } catch (e) {
                    showMessage("Erro ao conectar na sala.", "error");
                }
            };

            // Componente Fixo que Mostra o Código da Sala (HUD)
            const RoomBadge = () => {
                if (!inRoom) return null;
                return (
                    <div class="fixed bottom-6 right-6 z-50 bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl px-6 py-3 shadow-float animate-slide-up flex flex-col items-center group cursor-pointer hover:bg-white/10 transition-colors" onClick={() => {navigator.clipboard.writeText(roomId); showMessage("Código copiado!", "success")}}>
                        <span class="text-[10px] font-bold tracking-widest text-white/50 uppercase mb-1">Código da Sala</span>
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 bg-futuristic-success rounded-full animate-pulse shadow-glow-success"></div>
                            <span class="text-xl font-mono font-bold tracking-[0.2em] text-white">{roomId}</span>
                            <i class="fa-solid fa-copy text-white/30 text-xs ml-1 group-hover:text-white/80 transition-colors"></i>
                        </div>
                    </div>
                );
            };

            // --- RENDERIZADORES DE ESTADO ---
            
            if (!firebaseLoaded) {
                return (
                    <div class="min-h-screen flex items-center justify-center bg-futuristic-bg text-white">
                        <div class="flex flex-col items-center animate-pulse">
                            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-futuristic-primary mb-4"></i>
                            <span class="font-bold tracking-widest uppercase text-sm text-futuristic-textSec">Conectando...</span>
                        </div>
                    </div>
                );
            }

            const renderIntro = () => {
                if (isJoiningRoom) {
                    return (
                        <div class="relative flex flex-col items-center justify-center min-h-screen p-6 text-center overflow-hidden">
                            <div class="ambient-glow bg-futuristic-primary top-[20%] left-[20%] animate-pulse-glow"></div>
                            <div class="glass-panel relative max-w-lg w-full p-12 rounded-[2.5rem] animate-scale-in">
                                <h2 class="text-3xl font-extrabold mb-8 tracking-tighter text-white">Entrar na Sala</h2>
                                <div class="space-y-4 mb-8">
                                    <input 
                                        type="text" 
                                        placeholder="SEU NOME" 
                                        value={joinName}
                                        onChange={e => setJoinName(e.target.value)}
                                        maxLength={20}
                                        class="premium-input w-full rounded-2xl p-5 text-center text-xl font-bold uppercase"
                                    />
                                    <input 
                                        type="text" 
                                        placeholder="CÓDIGO DA SALA" 
                                        value={joinCode}
                                        onChange={e => setJoinCode(e.target.value.toUpperCase())}
                                        maxLength={5}
                                        class="premium-input w-full rounded-2xl p-5 text-center text-3xl tracking-[0.5em] font-bold uppercase"
                                    />
                                </div>
                                <div class="flex flex-col md:flex-row gap-4">
                                    <button onClick={() => setIsJoiningRoom(false)} class="flex-1 bg-white/5 border border-white/10 hover:bg-white/10 text-white font-bold py-4 rounded-2xl transition-all">
                                        Voltar
                                    </button>
                                    <button onClick={() => joinRoom(joinCode, joinName)} class="flex-1 btn-premium text-white font-bold py-4 rounded-2xl transition-all shadow-glow-primary">
                                        Entrar <i class="fa-solid fa-right-to-bracket ml-2"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    );
                }

                return (
                    <div class="relative flex flex-col items-center justify-center min-h-screen p-6 text-center overflow-hidden">
                        <div class="ambient-glow bg-futuristic-primary top-[20%] left-[20%] animate-pulse-glow"></div>
                        <div class="ambient-glow bg-futuristic-secondary bottom-[20%] right-[20%] animate-pulse-glow" style={{animationDelay: '1s'}}></div>

                        <div class="glass-panel relative max-w-3xl w-full p-12 md:p-16 rounded-[2.5rem] animate-scale-in">
                            <div class="inline-flex items-center justify-center w-24 h-24 rounded-3xl bg-white/5 border border-white/10 text-futuristic-secondary mb-10 shadow-inner-glow relative overflow-hidden">
                                <div class="absolute inset-0 bg-gradient-to-br from-futuristic-primary/20 to-transparent"></div>
                                <i class="fa-solid fa-scale-balanced text-5xl relative z-10 drop-shadow-[0_0_15px_rgba(56,189,248,0.5)]"></i>
                            </div>
                            
                            <h1 class="text-5xl md:text-6xl font-extrabold mb-8 tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-white to-white/60 drop-shadow-sm">
                                O Desafio dos Princípios
                            </h1>
                            
                            <p class="text-lg md:text-xl text-futuristic-textSec mb-12 leading-relaxed font-light max-w-xl mx-auto">
                                No dia a dia, enfrentamos muitas decisões. Crie uma sala online para jogar com os amigos ou inicie a experiência localmente agora mesmo.
                            </p>
                            
                            <div class="flex flex-col sm:flex-row flex-wrap justify-center gap-4 w-full max-w-2xl mx-auto">
                                <button onClick={createRoom} class="btn-premium flex-1 min-w-[200px] text-white font-semibold py-4 rounded-2xl text-base shadow-glow-primary transition-all active:scale-95">
                                    Criar Sala <i class="fa-solid fa-globe ml-2"></i>
                                </button>
                                <button onClick={() => setIsJoiningRoom(true)} class="flex-1 min-w-[200px] bg-white/5 hover:bg-white/10 border border-white/10 text-white font-semibold py-4 rounded-2xl text-base transition-all active:scale-95 shadow-soft">
                                    Entrar <i class="fa-solid fa-users ml-2 text-white/50"></i>
                                </button>
                                <button onClick={() => syncUpdate({ gameState: 'setup_teams' })} class="flex-1 min-w-[200px] bg-transparent hover:bg-white/5 border border-transparent hover:border-white/10 text-white/50 hover:text-white font-semibold py-4 rounded-2xl text-base transition-all active:scale-95">
                                    Jogar Local <i class="fa-solid fa-mobile-screen ml-2"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderSetupTeams = () => {
                const addTeam = () => {
                    if (teams.length >= 6) {
                        showMessage("Máximo de 6 equipes atingido.");
                        return;
                    }
                    const newTeams = [...teams, { id: generateId(), name: `Equipe ${teams.length + 1}` }];
                    setTeams(newTeams); // Update local fast
                    syncUpdate({ teams: newTeams }); // Sync
                };

                const updateTeamName = (id, newName) => {
                    setTeams(teams.map(t => t.id === id ? { ...t, name: newName } : t));
                };
                
                const handleTeamBlur = () => {
                    syncUpdate({ teams }); // Sync exactly when typing finishes to avoid lag
                };

                const removeTeam = (id) => {
                    if (teams.length <= 2) {
                        showMessage("Mínimo de 2 equipes necessário.");
                        return;
                    }
                    const newTeams = teams.filter(t => t.id !== id);
                    setTeams(newTeams);
                    syncUpdate({ teams: newTeams });
                };

                return (
                    <div class="flex flex-col items-center py-20 px-6 min-h-screen relative overflow-hidden">
                        <div class="ambient-glow bg-futuristic-primary/40 top-0 right-0"></div>
                        <div class="glass-panel w-full max-w-2xl rounded-[2.5rem] p-10 md:p-14 animate-slide-up">
                            <div class="w-16 h-16 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center text-futuristic-primary mb-8 shadow-inner-glow">
                                <i class="fa-solid fa-users-viewfinder text-2xl drop-shadow-[0_0_10px_rgba(124,92,255,0.5)]"></i>
                            </div>
                            <h2 class="text-4xl font-bold mb-3 tracking-tight text-white">Jogadores</h2>
                            <p class="text-futuristic-textSec mb-10 font-medium">Configure as equipes ou participantes.</p>
                            
                            <div class="space-y-5 mb-10">
                                {teams.map((team, index) => (
                                    <div key={team.id} class="flex items-center gap-4 group">
                                        <div class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 text-white/50 font-bold flex items-center justify-center shrink-0 transition-all group-focus-within:border-futuristic-primary group-focus-within:text-futuristic-primary group-focus-within:shadow-glow">
                                            {index + 1}
                                        </div>
                                        <input 
                                            type="text" 
                                            value={team.name}
                                            onChange={(e) => isHost && updateTeamName(team.id, e.target.value)}
                                            onBlur={isHost ? handleTeamBlur : undefined}
                                            readOnly={!isHost}
                                            class={`premium-input flex-1 rounded-2xl px-6 py-4 font-medium ${!isHost ? 'opacity-70 cursor-not-allowed border-transparent' : ''}`}
                                            placeholder="Nome do jogador/equipe"
                                        />
                                        {isHost && (
                                            <button onClick={() => removeTeam(team.id)} class="w-12 h-12 flex items-center justify-center text-white/30 hover:text-futuristic-danger hover:bg-futuristic-danger/10 rounded-2xl transition-all" title="Remover">
                                                <i class="fa-solid fa-xmark text-lg"></i>
                                            </button>
                                        )}
                                    </div>
                                ))}
                            </div>
                            
                            {isHost ? (
                                <div class="flex flex-col gap-5 pt-8 border-t border-white/10">
                                    <button onClick={addTeam} class="w-full py-4 text-sm font-semibold text-futuristic-textSec hover:text-white bg-white/5 hover:bg-white/10 border border-white/5 hover:border-white/20 rounded-2xl transition-all flex items-center justify-center gap-2">
                                        <i class="fa-solid fa-plus text-xs"></i> Adicionar Participante
                                    </button>
                                    
                                    <button 
                                        onClick={() => {
                                            if (teams.some(t => t.name.trim() === '')) {
                                                showMessage("Preencha todos os nomes das equipes.");
                                                return;
                                            }
                                            syncUpdate({ gameState: 'setup_question', teams });
                                        }}
                                        class="btn-premium w-full text-white px-6 py-5 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-glow-primary text-lg"
                                    >
                                        Avançar <i class="fa-solid fa-arrow-right"></i>
                                    </button>
                                </div>
                            ) : (
                                <div class="flex flex-col items-center justify-center pt-10 border-t border-white/10 text-center">
                                    <i class="fa-solid fa-circle-notch fa-spin text-3xl text-futuristic-primary mb-4 shadow-glow-primary rounded-full"></i>
                                    <p class="text-futuristic-textSec font-bold tracking-widest uppercase text-xs">Aguardando o anfitrião iniciar...</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderSetupQuestion = () => {
                const handleDrawQuestion = () => {
                    let pool = availableQuestions;
                    
                    if (selectedCategoryFilter !== 'all') {
                        pool = pool.filter(q => q.category === selectedCategoryFilter);
                    }

                    let newAvailable = availableQuestions;

                    if (pool.length === 0) {
                        const missingQuestions = ALL_QUESTIONS.filter(q => 
                            selectedCategoryFilter === 'all' || q.category === selectedCategoryFilter
                        );
                        
                        const currentTexts = new Set(availableQuestions.map(q => q.text));
                        newAvailable = [...availableQuestions, ...missingQuestions.filter(q => !currentTexts.has(q.text))];
                        pool = missingQuestions;
                        
                        showMessage(
                            selectedCategoryFilter === 'all' 
                            ? "Todas as perguntas foram sorteadas! A lista foi reiniciada." 
                            : "Todas as perguntas deste assunto foram sorteadas! A lista foi reiniciada.", 
                            "info"
                        );
                    }
                    
                    const randomIndex = Math.floor(Math.random() * pool.length);
                    const drawn = pool[randomIndex];
                    
                    const remainingAvailable = newAvailable.filter(q => q.text !== drawn.text);
                    
                    // Sincroniza
                    syncUpdate({
                        currentQuestion: drawn.text,
                        currentCategory: drawn.category,
                        availableQuestions: remainingAvailable
                    });
                };
                
                const handleQuestionBlur = () => {
                     syncUpdate({ currentQuestion, currentCategory });
                };

                return (
                    <div class="flex flex-col items-center py-20 px-6 min-h-screen relative overflow-hidden">
                        <div class="ambient-glow bg-futuristic-secondary/30 top-[10%] left-[10%]"></div>
                        <div class="glass-panel w-full max-w-3xl rounded-[2.5rem] p-10 md:p-14 animate-slide-up">
                            
                            {isHost ? (
                                <>
                                    <div class="flex justify-between items-start mb-10">
                                        <div>
                                            <h2 class="text-4xl font-bold mb-3 tracking-tight text-white">A Grande Pergunta</h2>
                                            <p class="text-futuristic-textSec font-medium">Defina a situação a ser analisada.</p>
                                        </div>
                                        <div class="w-14 h-14 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center text-futuristic-secondary shrink-0 shadow-inner-glow">
                                            <i class="fa-solid fa-compass text-2xl drop-shadow-[0_0_10px_rgba(56,189,248,0.5)]"></i>
                                        </div>
                                    </div>
                                    
                                    <div class="flex bg-black/40 border border-white/5 p-1.5 rounded-2xl mb-10 shadow-inner">
                                        <button 
                                            onClick={() => setQuestionInputMode('draw')}
                                            class={`flex-1 py-3.5 px-4 text-sm font-bold rounded-xl transition-all flex items-center justify-center gap-2 ${questionInputMode === 'draw' ? 'bg-white/10 text-white shadow-sm border border-white/10' : 'text-white/40 hover:text-white/70'}`}
                                        >
                                            <i class="fa-solid fa-dice"></i> Sortear
                                        </button>
                                        <button 
                                            onClick={() => setQuestionInputMode('custom')}
                                            class={`flex-1 py-3.5 px-4 text-sm font-bold rounded-xl transition-all flex items-center justify-center gap-2 ${questionInputMode === 'custom' ? 'bg-white/10 text-white shadow-sm border border-white/10' : 'text-white/40 hover:text-white/70'}`}
                                        >
                                            <i class="fa-solid fa-pen"></i> Escrever Própria
                                        </button>
                                    </div>
                                    
                                    {questionInputMode === 'draw' && (
                                        <div class="animate-scale-in">
                                            <div class="mb-8 w-full">

                                                        <span class="text-xs uppercase tracking-widest">Depende</span>

                                                    <button onClick={() => categorizeActive('nao')} class="group relative overflow-hidden bg-white/5 border border-white/10 hover:border-futuristic-danger text-white py-5 rounded-2xl font-bold flex flex-col items-center justify-center gap-2 transition-all hover:bg-futuristic-danger/10 hover:shadow-glow-danger active:scale-95">
                                                        <i class="fa-solid fa-xmark text-2xl text-futuristic-danger drop-shadow-[0_0_8px_rgba(239,68,68,0.8)]"></i>
                                                        <span class="text-xs uppercase tracking-widest">Não</span>

            const renderTop3 = () => {
                const sortedPrinciples = principles.filter(p => p.category !== 'pool');
                const top3Count = principles.filter(p => p.isTop3).length;

                const toggleTop3 = (id) => {
                    const principle = principles.find(p => p.id === id);
                    if (!principle.isTop3 && top3Count >= 3) {
                        showMessage("Máximo de 3 princípios alcançado.", "warning");
                        return;
                    }
                    const updatedPrinciples = principles.map(p => 
                        p.id === id ? { ...p, isTop3: !p.isTop3 } : p
                    );
                    syncUpdate({ principles: updatedPrinciples });
                };

                return (
                    <div class="min-h-screen flex flex-col py-12 px-6">
                        <div class="max-w-[1400px] mx-auto w-full flex-1 flex flex-col relative z-10">
                            
                            <div class="text-center mb-12 animate-slide-up">
                                <h2 class="text-5xl font-extrabold mb-4 tracking-tight text-white bg-clip-text text-transparent bg-gradient-to-r from-white to-white/70">Melhores Princípios</h2>
                                <p class="text-futuristic-textSec font-medium max-w-2xl mx-auto text-lg">Selecione os 3 princípios de maior peso que guiarão a decisão final.</p>
                                <div class="mt-8 inline-flex items-center gap-4 bg-white/5 border border-white/10 shadow-inner-glow rounded-full px-6 py-2.5 backdrop-blur-md">
                                    <span class="font-mono font-bold text-2xl text-futuristic-primary drop-shadow-[0_0_8px_rgba(124,92,255,0.8)]">{top3Count}</span>
                                    <span class="text-xs font-bold text-white/50 uppercase tracking-widest border-l border-white/10 pl-4">de 3 Selecionados</span>
                                </div>
                            </div>

                            <div class="flex-1 flex flex-col lg:flex-row gap-10 overflow-hidden h-full">
                                
                                {/* Pool of Sorted */}
                                <div class="flex-1 glass-panel rounded-[2.5rem] p-8 lg:p-10 overflow-y-auto custom-scrollbar flex flex-col">
                                    <h3 class="text-xs font-bold uppercase tracking-widest text-white/40 mb-8 flex items-center gap-3">
                                        <i class="fa-solid fa-list-check"></i> Princípios Triados
                                    </h3>
                                    <div class="grid gap-4 flex-1">
                                        {sortedPrinciples.map(p => {
                                            const isSelected = p.isTop3;
                                            let catStyle = 'border-white/10 hover:border-white/30';
                                            let dotColor = 'bg-white/30';
                                            if (p.category === 'sim') { catStyle = 'border-futuristic-success/30 hover:border-futuristic-success bg-futuristic-success/5'; dotColor = 'bg-futuristic-success shadow-[0_0_8px_rgba(16,185,129,0.8)]'; }
                                            if (p.category === 'nao') { catStyle = 'border-futuristic-danger/30 hover:border-futuristic-danger bg-futuristic-danger/5'; dotColor = 'bg-futuristic-danger shadow-[0_0_8px_rgba(239,68,68,0.8)]'; }
                                            if (p.category === 'depende') { catStyle = 'border-futuristic-warning/30 hover:border-futuristic-warning bg-futuristic-warning/5'; dotColor = 'bg-futuristic-warning shadow-[0_0_8px_rgba(245,158,11,0.8)]'; }

                                            return (
                                                <div 
                                                    key={p.id} 
                                                    onClick={() => toggleTop3(p.id)}
                                                    class={`cursor-pointer p-6 rounded-2xl border transition-all duration-300 flex items-center justify-between gap-5 backdrop-blur-sm
                                                        ${isSelected ? 'opacity-30 scale-[0.98] border-white/5 bg-black/40' : `bg-white/5 hover:bg-white/10 shadow-sm hover:shadow-[0_5px_20px_rgba(0,0,0,0.3)] ${catStyle}`}`}
                                                >
                                                    <div class="flex-1 min-w-0">
                                                        <div class="flex items-center gap-3 mb-2">
                                                            <span class={`w-2 h-2 rounded-full ${dotColor}`}></span>
                                                            <span class="text-[9px] uppercase tracking-widest font-bold text-white/40">{p.category}</span>
                                                        </div>
                                                        <p class="font-medium text-base leading-relaxed text-white/90">{p.text}</p>
                                                        {p.scripture && <p class="text-xs text-futuristic-secondary font-bold mt-2 flex items-center gap-1.5"><i class="fa-solid fa-book-open opacity-50 text-[10px]"></i>{p.scripture}</p>}
                                                    </div>
                                                    <div class={`shrink-0 w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all
                                                        ${isSelected ? 'border-futuristic-primary bg-futuristic-primary text-white shadow-glow-primary' : 'border-white/20'}`}
                                                    >
                                                        {isSelected && <i class="fa-solid fa-check text-sm"></i>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Premium Silver Area Display */}
                                <div class="flex-1 flex flex-col gap-8">
                                    <div class="relative overflow-hidden bg-gradient-to-br from-zinc-800 to-zinc-950 border border-white/20 rounded-[2.5rem] p-10 shadow-[0_20px_50px_-12px_rgba(255,255,255,0.05)] flex-1 flex flex-col">
                                        
                                        {/* Premium Shimmer */}
                                        <div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/5 to-transparent -translate-x-full animate-[shimmer_4s_infinite]"></div>
                                        <style>{`@keyframes shimmer { 100% { transform: translateX(100%); } }`}</style>
                                        
                                        <div class="absolute top-8 right-8 text-white/5 text-8xl drop-shadow-md">
                                            <i class="fa-solid fa-trophy"></i>
                                        </div>

                                        <div class="relative z-10 flex flex-col h-full">
                                            <h3 class="text-sm font-bold mb-10 text-white/50 uppercase tracking-widest border-b border-white/10 pb-5 flex items-center gap-3">
                                                <i class="fa-solid fa-ranking-star"></i> Fatores Decisivos
                                            </h3>
                                            
                                            <div class="flex-1 flex flex-col gap-5 justify-center">
                                                {principles.filter(p => p.isTop3).length === 0 && (
                                                    <div class="text-center flex flex-col items-center justify-center h-full opacity-60">
                                                        <div class="w-20 h-20 border-2 border-dashed border-white/20 rounded-full flex items-center justify-center mb-6 text-white/30">
                                                            <i class="fa-solid fa-plus text-3xl"></i>
                                                        </div>
                                                        <p class="text-white/60 font-medium text-base">Selecione ao lado os princípios mais essenciais.</p>
                                                    </div>
                                                )}
                                                
                                                {principles.filter(p => p.isTop3).map((p, idx) => (
                                                    <div key={p.id} class="bg-white/10 backdrop-blur-xl rounded-2xl p-6 shadow-[0_8px_32px_rgba(0,0,0,0.3)] border border-white/20 flex gap-5 items-start animate-slide-up hover:-translate-y-1 transition-transform">
                                                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-futuristic-primary to-futuristic-secondary text-white flex items-center justify-center font-black text-lg shrink-0 shadow-glow-primary mt-1">
                                                            {idx + 1}
                                                        </div>
                                                        <div>
                                                            <p class="font-bold text-white text-lg leading-snug mb-2">{p.text}</p>
                                                            {p.scripture && <p class="text-xs font-bold text-futuristic-secondary uppercase tracking-widest">{p.scripture}</p>}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {isHost ? (
                                        <button 
                                            onClick={() => syncUpdate({ gameState: 'result' })}
                                            disabled={top3Count === 0}
                                            class={`py-6 rounded-2xl font-bold text-lg transition-all flex justify-center items-center gap-3
                                                ${top3Count > 0 ? 'btn-premium text-white shadow-glow-primary active:scale-95' : 'bg-white/5 text-white/30 cursor-not-allowed border border-white/10'}`}
                                        >
                                            Gerar Relatório Final <i class="fa-solid fa-file-contract text-lg"></i>
                                        </button>
                                    ) : (
                                        <div class="bg-black/20 border border-white/5 rounded-2xl py-6 flex flex-col items-center justify-center mt-auto shadow-inner">
                                            <i class="fa-solid fa-circle-notch fa-spin text-futuristic-primary mb-3 text-2xl"></i>
                                            <p class="text-[10px] text-futuristic-textSec font-bold uppercase tracking-widest">Aguardando finalização do anfitrião</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderResult = () => {
                const top3 = principles.filter(p => p.isTop3);
                const getTeamName = (id) => teams.find(t => t.id === id)?.name || 'Desconhecido';
                
                return (
                    <div class="min-h-screen py-20 px-6 flex flex-col items-center justify-center">
                        <div class="w-full max-w-3xl glass-panel rounded-[2.5rem] shadow-[0_20px_50px_-10px_rgba(0,0,0,0.8)] overflow-hidden animate-slide-up relative z-10 border border-white/20">
                            
                            {/* Premium Header */}
                            <div class="bg-gradient-to-br from-[#1E293B] to-[#050816] p-12 text-center relative overflow-hidden border-b border-white/10">
                                <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-[0.03] mix-blend-overlay"></div>
                                <div class="absolute top-0 right-0 w-64 h-64 bg-futuristic-primary/20 blur-[100px]"></div>
                                <div class="relative z-10 flex flex-col items-center">
                                    <div class="mb-8">
                                        <CategoryBadge categoryKey={currentCategory} />
                                    </div>
                                    <h1 class="text-3xl md:text-4xl font-extrabold leading-snug mb-0 text-white drop-shadow-md">"{currentQuestion}"</h1>
                                </div>
                            </div>

                            {/* Content Area */}
                            <div class="p-10 md:p-14 bg-black/20">
                                <div class="flex items-center gap-4 mb-10">
                                    <hr class="flex-1 border-white/10" />
                                    <span class="text-futuristic-textSec text-[10px] font-bold uppercase tracking-widest flex items-center gap-2">
                                        <i class="fa-solid fa-map-location-dot"></i> Princípios Norteadores
                                    </span>
                                    <hr class="flex-1 border-white/10" />
                                </div>
                                
                                <div class="space-y-6">
                                    {top3.map((p, idx) => (
                                        <div key={p.id} class="group flex gap-6 p-6 rounded-2xl bg-white/5 border border-white/10 hover:border-white/20 transition-all hover:bg-white/10 relative overflow-hidden">
                                            <div class="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-futuristic-primary to-futuristic-secondary opacity-50 group-hover:opacity-100 transition-opacity"></div>
                                            <div class="text-4xl font-black text-white/10 group-hover:text-white/20 transition-colors pt-1">
                                                0{idx + 1}
                                            </div>
                                            <div class="flex-1">
                                                <p class="text-xl text-white font-semibold mb-3 leading-snug">{p.text}</p>
                                                {p.scripture && (
                                                    <p class="text-sm font-bold text-futuristic-secondary mb-5 flex items-center gap-1.5">
                                                        <i class="fa-solid fa-book-bible text-[10px] opacity-70"></i> {p.scripture}
                                                    </p>
                                                )}
                                                
                                                <div class="flex items-center gap-4">
                                                    <span class={`text-[9px] uppercase font-bold tracking-widest px-2.5 py-1 rounded-md border backdrop-blur-sm
                                                        ${p.category === 'sim' ? 'bg-futuristic-success/10 text-futuristic-success border-futuristic-success/30' : 
                                                          p.category === 'nao' ? 'bg-futuristic-danger/10 text-futuristic-danger border-futuristic-danger/30' : 
                                                          'bg-futuristic-warning/10 text-futuristic-warning border-futuristic-warning/30'}`}>
                                                        {p.category}
                                                    </span>
                                                    <span class="text-[10px] text-white/40 font-semibold uppercase tracking-widest flex items-center gap-1.5">
                                                        <i class="fa-solid fa-user-pen"></i> {getTeamName(p.teamId)}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div class="mt-14 pt-8 border-t border-white/10 text-center flex flex-col items-center">
                                    <div class="w-14 h-14 bg-white/5 border border-white/10 text-white/40 rounded-full flex items-center justify-center text-xl mb-5 shadow-inner-glow">
                                        <i class="fa-solid fa-camera drop-shadow-md"></i>
                                    </div>
                                    <p class="text-sm text-white/50 font-medium">Capture esta tela para documentar a decisão final.</p>
                                </div>
                            </div>
                        </div>

                        {/* Bottom Actions */}
                        <div class="mt-10 flex gap-5 animate-slide-up justify-center" style={{animationDelay: '0.2s'}}>
                            {isHost && (
                                <button 
                                    onClick={() => {
                                        syncUpdate({ 
                                            gameState: 'setup_question', 
                                            currentQuestion: '', 
                                            currentCategory: null, 
                                            principles: [], 
                                            activePrinciple: null,
                                            isTimerRunning: false
                                        });
                                    }}
                                    class="bg-white/5 backdrop-blur-md border border-white/20 hover:bg-white/10 text-white font-bold py-4 px-8 rounded-full shadow-[0_0_15px_rgba(255,255,255,0.05)] transition-all active:scale-95 flex items-center gap-2"
                                >
                                    <i class="fa-solid fa-rotate-right"></i> Nova Pergunta
                                </button>
                            )}
                            <button 
                                onClick={() => window.location.reload()}
                                class="btn-premium text-white font-bold py-4 px-8 rounded-full transition-all active:scale-95 shadow-glow-primary flex items-center gap-2"
                            >
                                <i class="fa-solid fa-power-off"></i> Sair da Sala
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div class="relative antialiased selection:bg-futuristic-primary/30 selection:text-white">
                    {/* Floating Toast Notification */}
                    {message && (
                        <div class="fixed top-8 left-1/2 transform -translate-x-1/2 z-50 animate-slide-up">
                            <div class={`px-6 py-4 rounded-2xl shadow-float font-bold text-sm flex items-center gap-3 text-white border backdrop-blur-xl
                                ${message.type === 'error' ? 'bg-futuristic-danger/20 border-futuristic-danger/50 shadow-glow-danger' : 
                                  message.type === 'warning' ? 'bg-futuristic-warning/20 border-futuristic-warning/50' : 
                                  'bg-futuristic-success/20 border-futuristic-success/50 shadow-glow-success'}
                            `}>
                                <i class={`fa-solid text-lg ${message.type === 'error' ? 'fa-circle-exclamation' : 'fa-info-circle'}`}></i>
                                {message.text}
                            </div>
                        </div>
                    )}
                    
                    <RoomBadge />

                    {/* Game State Router */}
                    {gameState === 'intro' && renderIntro()}
                    {gameState === 'setup_teams' && renderSetupTeams()}
                    {gameState === 'setup_question' && renderSetupQuestion()}
                    {gameState === 'brainstorm' && renderBrainstorm()}
                    {gameState === 'sorting' && renderSorting()}
                    {gameState === 'top3' && renderTop3()}
                    {gameState === 'result' && renderResult()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
