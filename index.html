        const CategoryBadge = ({ categoryKey }) => {

            };

            const renderSetupQuestion = () => {
                const handleDrawQuestion = () => {
                    let pool = availableQuestions;
                    
                    if (selectedCategoryFilter !== 'all') {
                        pool = pool.filter(q => q.category === selectedCategoryFilter);
                    }

                    if (pool.length === 0) {
                        // Restore questions to the pool
                        const missingQuestions = ALL_QUESTIONS.filter(q => 
                            selectedCategoryFilter === 'all' || q.category === selectedCategoryFilter
                        );
                        
                        const currentTexts = new Set(availableQuestions.map(q => q.text));
                        const newAvailable = [...availableQuestions, ...missingQuestions.filter(q => !currentTexts.has(q.text))];
                        
                        setAvailableQuestions(newAvailable);
                        pool = missingQuestions;
                        
                        showMessage(
                            selectedCategoryFilter === 'all' 
                            ? "Todas as perguntas foram sorteadas! A lista foi reiniciada." 
                            : "Todas as perguntas deste assunto foram sorteadas! A lista foi reiniciada.", 
                            "info"
                        );
                    }
                    
                    const randomIndex = Math.floor(Math.random() * pool.length);
                    const drawn = pool[randomIndex];
                    
                    setCurrentQuestion(drawn.text);
                    setCurrentCategory(drawn.category);
                    
                    // Remove drawn from available list safely using functional state update
                    setAvailableQuestions(prev => prev.filter(q => q.text !== drawn.text));
                };

                return (
                    <div class="flex flex-col items-center py-12 px-4 min-h-screen bg-zinc-50">

                                    <i class="fa-solid fa-compass text-xl"></i>
                                </div>
                            </div>
                            
                            {/* Toggle Tabs */}
                            <div class="flex bg-zinc-100 p-1.5 rounded-2xl mb-8">
                                <button

                                >
                                    <i class="fa-solid fa-dice"></i> Sortear
                                </button>
                                <button 
                                    onClick={() => setQuestionInputMode('custom')}
                                    class={`flex-1 py-3 px-4 text-sm font-bold rounded-xl transition-all flex items-center justify-center gap-2 ${questionInputMode === 'custom' ? 'bg-white text-zinc-900 shadow-sm' : 'text-zinc-400 hover:text-zinc-700'}`}

                                                value={selectedCategoryFilter}

                                            >
                                                <option value="all">🎲 Todos os Assuntos</option>

                                    </div>

                                </button>

                        teamId: currentSelectedTeam,

                        isTop3: false

                    setPrinciples([...principles, newPrinciple]);
                    setPrincipleText('');

                                <h3 class="text-2xl font-bold mb-8 text-zinc-900 tracking-tight">Novo Princípio</h3>
                                
                                <form onSubmit={handleAddPrinciple} class="space-y-6">
                                    <div class="space-y-2">
                                        <label class="block text-xs font-bold text-zinc-400 uppercase tracking-widest pl-1">Vez de</label>
                                        <div class="relative">
                                            <select 
                                                value={currentSelectedTeam} 
                                                onChange={(e) => setSelectedTeamId(e.target.value)}
                                                class="premium-input w-full appearance-none rounded-2xl p-4 font-semibold text-zinc-800 cursor-pointer"
                                            >
                                                {teams.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                            </select>
                                            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-zinc-400">
                                                <i class="fa-solid fa-chevron-down text-sm"></i>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="space-y-2">
                                        <label class="block text-xs font-bold text-zinc-400 uppercase tracking-widest pl-1">O que a Bíblia ensina?</label>
                                        <textarea 
                                            value={principleText}
                                            onChange={(e) => setPrincipleText(e.target.value)}
                                            class="premium-input w-full rounded-2xl p-4 font-medium text-zinc-800 resize-none min-h-[120px]"
                                            placeholder="Ex: Más companhias estragam bons hábitos."
                                        ></textarea>
                                    </div>

                                    <div class="space-y-2">
                                        <label class="block text-xs font-bold text-zinc-400 uppercase tracking-widest pl-1">Texto Bíblico (Opcional)</label>
                                        <input 
                                            type="text"
                                            value={scriptureText}
                                            onChange={(e) => setScriptureText(e.target.value)}
                                            class="premium-input w-full rounded-2xl p-4 font-medium text-zinc-800"
                                            placeholder="Ex: 1 Coríntios 15:33"
                                        />
                                    </div>

                                    <button type="submit" class="w-full bg-violet-50 text-violet-700 hover:bg-violet-600 hover:text-white font-bold py-4 rounded-2xl transition-all active:scale-95 mt-4 border border-violet-100 hover:border-violet-600">
                                        Adicionar à Pilha
                                    </button>
                                </form>

                            <div class="w-full lg:w-[320px] shrink-0 space-y-6">
                                {/* Counter Widget */}
                                <div class="bg-zinc-900 rounded-[2.5rem] shadow-float p-8 text-center text-white relative overflow-hidden">
                                    <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full blur-2xl -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>
                                    <div class="text-[5rem] font-black tracking-tighter leading-none mb-2">{principles.length}</div>
                                    <div class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Princípios na Pilha</div>
                                </div>
                                
                                {/* Action Widget */}
                                <div class="bg-white rounded-[2rem] shadow-soft border border-zinc-100 p-6 text-center">
                                    <div class="w-10 h-10 bg-zinc-50 rounded-full flex items-center justify-center text-zinc-400 mx-auto mb-4">
                                        <i class="fa-solid fa-layer-group"></i>
                                    </div>
                                    <p class="text-sm text-zinc-500 mb-6 font-medium leading-relaxed">Pensem na maior quantidade possível de princípios relacionados.</p>
                                    <button 
                                        onClick={() => {
                                            if(principles.length === 0) {
                                                showMessage("Adicione pelo menos um princípio para continuar.", "warning");
                                                return;
                                            }
                                            setIsTimerRunning(false);
                                            setGameState('sorting');
                                        }}
                                        class="w-full bg-white border-2 border-zinc-200 hover:border-zinc-900 text-zinc-900 font-bold py-3 px-4 rounded-2xl transition-all active:scale-95"
                                    >
                                        Classificar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderSorting = () => {
                const pool = principles.filter(p => p.category === 'pool');
                const sim = principles.filter(p => p.category === 'sim');
                const nao = principles.filter(p => p.category === 'nao');
                const depende = principles.filter(p => p.category === 'depende');

                const currentTeam = teams[currentTurnIndex];

                const drawNextPrinciple = () => {
                    if (pool.length > 0) {
                        const randomIndex = Math.floor(Math.random() * pool.length);
                        setActivePrinciple(pool[randomIndex]);
                    }
                };

                const categorizeActive = (category) => {
                    if (!activePrinciple) return;
                    setPrinciples(principles.map(p => 
                        p.id === activePrinciple.id ? { ...p, category: category } : p
                    ));
                    setActivePrinciple(null);
                    setCurrentTurnIndex((currentTurnIndex + 1) % teams.length);
                };

                const getTeamName = (id) => teams.find(t => t.id === id)?.name || 'Desconhecido';

                return (
                    <div class="flex flex-col min-h-screen bg-zinc-50">
                        {/* Header */}
                        <div class="glass-header sticky top-0 z-10 px-4 py-4 flex flex-col items-center border-b border-zinc-200 gap-2">
                            <CategoryBadge categoryKey={currentCategory} />
                            <h2 class="text-lg md:text-xl font-bold text-zinc-800 text-center max-w-3xl line-clamp-1" title={currentQuestion}>{currentQuestion}</h2>
                        </div>

                        {/* Main Board */}
                        <div class="flex-1 p-4 md:p-6 flex flex-col lg:flex-row gap-6 max-w-[1400px] mx-auto w-full h-full">
                            
                            {/* Action Area */}
                            <div class="w-full lg:w-[400px] flex flex-col gap-4">
                                {/* Card Area */}
                                <div class="flex-1 bg-white rounded-[2.5rem] shadow-soft border border-zinc-100 p-8 flex flex-col items-center justify-center min-h-[400px] relative">
                                    
                                    {!activePrinciple && pool.length > 0 && (
                                        <div class="text-center flex flex-col items-center h-full justify-center w-full animate-scale-in">
                                            {/* Beautiful CSS Deck */}
                                            <div class="relative mb-10 w-36 h-48 cursor-pointer group" onClick={drawNextPrinciple}>
                                                <div class="absolute inset-0 bg-white border border-zinc-200 rounded-2xl shadow-sm rotate-6 group-hover:rotate-12 transition-transform duration-500 origin-bottom-right"></div>
                                                <div class="absolute inset-0 bg-white border border-zinc-200 rounded-2xl shadow-sm -rotate-3 group-hover:-rotate-6 transition-transform duration-500 origin-bottom-left"></div>
                                                <div class="absolute inset-0 bg-zinc-900 border border-zinc-800 rounded-2xl shadow-float flex flex-col items-center justify-center text-white transition-transform duration-300 group-hover:-translate-y-4">
                                                    <i class="fa-brands fa-buffer text-4xl mb-2 opacity-80"></i>
                                                    <span class="text-sm font-bold opacity-50 uppercase tracking-widest text-[10px]">Comprar</span>
                                                </div>
                                            </div>
                                            <p class="text-zinc-400 font-bold text-sm uppercase tracking-widest mb-6">Restam {pool.length}</p>
                                            <button 
                                                onClick={drawNextPrinciple}
                                                class="bg-zinc-100 hover:bg-zinc-200 text-zinc-900 font-bold py-4 px-8 rounded-full transition-all active:scale-95 w-full text-sm shadow-sm"
                                            >
                                                Revelar Próximo
                                            </button>
                                        </div>
                                    )}

                                    {activePrinciple && (
                                        <div class="w-full h-full flex flex-col animate-slide-up">
                                            <div class="flex-1 relative">
                                                {/* Active Card Styling */}
                                                <div class="absolute inset-0 bg-white border-2 border-violet-100 shadow-[0_20px_50px_-12px_rgba(139,92,246,0.15)] rounded-3xl p-8 flex flex-col justify-center">
                                                    <div class="absolute top-6 left-6 text-violet-200 text-4xl opacity-50">
                                                        <i class="fa-solid fa-quote-left"></i>
                                                    </div>
                                                    <p class="text-xl lg:text-2xl font-semibold text-zinc-800 text-center mb-6 leading-tight relative z-10">
                                                        {activePrinciple.text}
                                                    </p>
                                                    {activePrinciple.scripture && (
                                                        <div class="bg-violet-50 text-violet-700 py-2 px-4 rounded-xl text-center font-bold text-sm mx-auto shadow-sm">
                                                            {activePrinciple.scripture}
                                                        </div>
                                                    )}
                                                    <div class="absolute bottom-6 left-0 w-full text-center text-[10px] uppercase font-bold tracking-widest text-zinc-300">
                                                        Por {getTeamName(activePrinciple.teamId)}
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div class="mt-8 pt-6 border-t border-zinc-100">
                                                <p class="text-center text-[10px] font-bold text-zinc-400 mb-4 uppercase tracking-widest">Decisão de Destino</p>
                                                <div class="grid grid-cols-3 gap-3">
                                                    <button onClick={() => categorizeActive('sim')} class="group relative overflow-hidden bg-white border border-emerald-200 hover:border-emerald-500 text-emerald-700 py-4 rounded-2xl font-bold flex flex-col items-center justify-center gap-2 transition-all active:scale-95 shadow-sm">
                                                        <div class="absolute inset-0 bg-emerald-50 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                                        <i class="fa-solid fa-check text-xl relative z-10"></i>
                                                        <span class="text-xs relative z-10">Sim</span>
                                                    </button>

                                                        <div class="absolute inset-0 bg-amber-50 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                                        <i class="fa-solid fa-scale-unbalanced text-xl relative z-10"></i>
                                                        <span class="text-xs relative z-10">Depende</span>
                                                    </button>
                                                    <button onClick={() => categorizeActive('nao')} class="group relative overflow-hidden bg-white border border-rose-200 hover:border-rose-500 text-rose-700 py-4 rounded-2xl font-bold flex flex-col items-center justify-center gap-2 transition-all active:scale-95 shadow-sm">
                                                        <div class="absolute inset-0 bg-rose-50 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                                        <i class="fa-solid fa-xmark text-xl relative z-10"></i>
                                                        <span class="text-xs relative z-10">Não</span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>

                                                <i class="fa-solid fa-check"></i>
                                            </div>
                                            <h3 class="text-2xl font-bold text-zinc-900 mb-2">Concluído!</h3>
                                            <p class="text-zinc-500 mb-8 font-medium">Todos os princípios foram alocados.</p>
                                            <button 
                                                onClick={() => setGameState('top3')}
                                                class="bg-zinc-900 hover:bg-zinc-800 text-white font-bold py-4 px-8 rounded-full shadow-float transition-all active:scale-95 w-full flex items-center justify-center gap-2"
                                            >
                                                Ver Decisivos <i class="fa-solid fa-arrow-right"></i>
                                            </button>
                                        </div>

                            </div>

                            {/* Sorted Columns Area */}
                            <div class="flex-1 flex gap-4 overflow-x-auto pb-4">
                                <Column title="Sim" items={sim} colorClass="emerald" icon="fa-check text-emerald-500" getTeamName={getTeamName} />
                                <Column title="Depende" items={depende} colorClass="amber" icon="fa-scale-unbalanced text-amber-500" getTeamName={getTeamName} />
                                <Column title="Não" items={nao} colorClass="rose" icon="fa-xmark text-rose-500" getTeamName={getTeamName} />
                            </div>
                        </div>
                    </div>
                );
            };

            const renderTop3 = () => {
                const sortedPrinciples = principles.filter(p => p.category !== 'pool');
                const top3Count = principles.filter(p => p.isTop3).length;

                const toggleTop3 = (id) => {
                    const principle = principles.find(p => p.id === id);
                    if (!principle.isTop3 && top3Count >= 3) {
                        showMessage("Máximo de 3 princípios alcançado.", "warning");
                        return;
                    }
                    setPrinciples(principles.map(p => 
                        p.id === id ? { ...p, isTop3: !p.isTop3 } : p
                    ));
                };

                // Premium Dark Mode aesthetic just for this view
                return (
                    <div class="min-h-screen bg-zinc-950 flex flex-col py-10 px-4 text-zinc-100 selection:bg-zinc-700 font-sans">
                        <div class="max-w-6xl mx-auto w-full flex-1 flex flex-col">
                            
                            <div class="text-center mb-10 animate-slide-up">
                                <h2 class="text-4xl font-extrabold mb-3 tracking-tight text-white">Área Prata</h2>
                                <p class="text-zinc-400 font-medium max-w-xl mx-auto">Dos princípios classificados, escolha os 3 que possuem o maior peso e fornecem a melhor direção.</p>
                                <div class="mt-6 inline-flex items-center gap-3 bg-zinc-900 border border-zinc-800 rounded-full px-5 py-2">
                                    <span class="font-mono font-bold text-lg text-white">{top3Count}</span>
                                    <span class="text-xs font-bold text-zinc-500 uppercase tracking-widest border-l border-zinc-700 pl-3">de 3 Selecionados</span>
                                </div>
                            </div>

                            <div class="flex-1 flex flex-col lg:flex-row gap-8 overflow-hidden h-full">
                                
                                {/* Pool of Sorted */}
                                <div class="flex-1 bg-zinc-900/50 rounded-[2.5rem] p-6 lg:p-8 overflow-y-auto custom-scrollbar border border-zinc-800 flex flex-col">
                                    <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-500 mb-6 px-2">Princípios Analisados</h3>
                                    <div class="grid gap-3 flex-1">
                                        {sortedPrinciples.map(p => {
                                            const isSelected = p.isTop3;
                                            // subtle color hints
                                            let catColor = 'bg-zinc-800 hover:bg-zinc-700 border-zinc-700/50';
                                            if (p.category === 'sim') catColor = 'bg-emerald-900/20 hover:bg-emerald-900/40 border-emerald-900/30';
                                            if (p.category === 'nao') catColor = 'bg-rose-900/20 hover:bg-rose-900/40 border-rose-900/30';
                                            if (p.category === 'depende') catColor = 'bg-amber-900/20 hover:bg-amber-900/40 border-amber-900/30';

                                            return (
                                                <div 
                                                    key={p.id} 
                                                    onClick={() => toggleTop3(p.id)}
                                                    class={`cursor-pointer p-5 rounded-2xl border transition-all duration-300 flex items-center justify-between gap-4 
                                                        ${isSelected ? 'opacity-40 scale-[0.98] grayscale border-transparent bg-zinc-900' : `${catColor} shadow-md`}`}
                                                >
                                                    <div class="flex-1 min-w-0">
                                                        <p class="font-medium text-sm leading-relaxed text-zinc-200">{p.text}</p>
                                                        {p.scripture && <p class="text-xs text-zinc-500 font-bold mt-2"><i class="fa-solid fa-book-open text-[10px] mr-1 opacity-70"></i>{p.scripture}</p>}
                                                    </div>
                                                    <div class={`shrink-0 w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors
                                                        ${isSelected ? 'border-zinc-500 bg-zinc-500 text-zinc-900' : 'border-zinc-600'}`}
                                                    >
                                                        {isSelected && <i class="fa-solid fa-check text-xs"></i>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Premium Silver Area Display */}
                                <div class="flex-1 flex flex-col gap-6">
                                    <div class="relative overflow-hidden bg-gradient-to-br from-zinc-200 via-zinc-300 to-zinc-400 rounded-[2.5rem] p-8 lg:p-10 shadow-[0_20px_50px_-12px_rgba(255,255,255,0.1)] flex-1 flex flex-col">
                                        
                                        {/* Metallic Shine effect */}
                                        <div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/40 to-transparent -translate-x-full animate-[shimmer_3s_infinite]"></div>
                                        <style>{`@keyframes shimmer { 100% { transform: translateX(100%); } }`}</style>
                                        
                                        <div class="absolute top-6 right-6 text-zinc-500/20 text-7xl drop-shadow-md">
                                            <i class="fa-solid fa-trophy"></i>
                                        </div>

                                        <div class="relative z-10 flex flex-col h-full">
                                            <h3 class="text-sm font-bold mb-8 text-zinc-600 uppercase tracking-widest border-b border-zinc-400/30 pb-4">
                                                Fatores Decisivos
                                            </h3>
                                            
                                            <div class="flex-1 flex flex-col gap-4 justify-center">
                                                {principles.filter(p => p.isTop3).length === 0 && (
                                                    <div class="text-center flex flex-col items-center justify-center h-full">
                                                        <div class="w-16 h-16 border-2 border-dashed border-zinc-400 rounded-full flex items-center justify-center mb-4 text-zinc-400">
                                                            <i class="fa-solid fa-plus text-xl"></i>
                                                        </div>
                                                        <p class="text-zinc-600 font-medium text-sm">Selecione ao lado os princípios mais importantes.</p>
                                                    </div>
                                                )}
                                                
                                                {principles.filter(p => p.isTop3).map((p, idx) => (
                                                    <div key={p.id} class="bg-white/80 backdrop-blur-md rounded-2xl p-5 shadow-sm border border-white/50 flex gap-4 items-start animate-slide-up hover:scale-[1.02] transition-transform">
                                                        <div class="w-8 h-8 rounded-full bg-zinc-900 text-white flex items-center justify-center font-bold text-sm shrink-0 shadow-sm mt-0.5">
                                                            {idx + 1}
                                                        </div>
                                                        <div>
                                                            <p class="font-bold text-zinc-800 text-sm md:text-base leading-snug mb-1">{p.text}</p>
                                                            {p.scripture && <p class="text-[11px] font-bold text-zinc-500 uppercase tracking-wide">{p.scripture}</p>}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <button 
                                        onClick={() => setGameState('result')}
                                        disabled={top3Count === 0}
                                        class={`py-5 rounded-full font-bold text-lg transition-all flex justify-center items-center gap-2
                                            ${top3Count > 0 ? 'bg-white text-zinc-900 hover:bg-zinc-100 shadow-glow active:scale-95' : 'bg-zinc-900 text-zinc-600 cursor-not-allowed border border-zinc-800'}`}
                                    >
                                        Finalizar Reflexão <i class="fa-solid fa-flag-checkered text-sm"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderResult = () => {
                const top3 = principles.filter(p => p.isTop3);
                const getTeamName = (id) => teams.find(t => t.id === id)?.name || 'Desconhecido';
                
                return (
                    <div class="min-h-screen bg-zinc-50 py-16 px-4 flex flex-col items-center justify-center bg-pattern">
                        <div class="w-full max-w-2xl bg-white rounded-[2.5rem] shadow-float overflow-hidden border border-zinc-100 animate-slide-up">
                            
                            {/* Header / Report Look */}
                            <div class="bg-zinc-900 p-10 text-center text-white relative overflow-hidden">
                                <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 mix-blend-overlay"></div>
                                <div class="relative z-10 flex flex-col items-center">
                                    <div class="mb-6">
                                        <CategoryBadge categoryKey={currentCategory} />
                                    </div>
                                    <h1 class="text-2xl md:text-3xl font-bold leading-tight mb-4 text-white">"{currentQuestion}"</h1>
                                </div>
                            </div>

                            {/* Content */}
                            <div class="p-8 md:p-12">
                                <p class="text-zinc-500 text-sm font-medium mb-8 text-center uppercase tracking-widest">Princípios Norteadores</p>
                                
                                <div class="space-y-6">
                                    {top3.map((p, idx) => (
                                        <div key={p.id} class="group flex gap-4 p-5 rounded-2xl bg-zinc-50 hover:bg-zinc-100 transition-colors border border-transparent hover:border-zinc-200">
                                            <div class="text-3xl font-black text-zinc-200 group-hover:text-zinc-300 transition-colors pt-1">
                                                0{idx + 1}
                                            </div>
                                            <div class="flex-1">
                                                <p class="text-lg text-zinc-800 font-semibold mb-2 leading-snug">{p.text}</p>
                                                {p.scripture && (
                                                    <p class="text-sm font-bold text-violet-600 mb-4">
                                                        {p.scripture}
                                                    </p>
                                                )}
                                                
                                                <div class="flex items-center gap-3">
                                                    <span class={`text-[10px] uppercase font-bold tracking-widest px-2 py-1 rounded-md
                                                        ${p.category === 'sim' ? 'bg-emerald-100 text-emerald-700' : 
                                                          p.category === 'nao' ? 'bg-rose-100 text-rose-700' : 
                                                          'bg-amber-100 text-amber-700'}`}>
                                                        {p.category}
                                                    </span>
                                                    <span class="text-[10px] text-zinc-400 font-medium uppercase tracking-wide">
                                                        Sugerido por {getTeamName(p.teamId)}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div class="mt-12 pt-8 border-t border-zinc-100 text-center flex flex-col items-center">
                                    <div class="w-12 h-12 bg-zinc-50 text-zinc-400 rounded-full flex items-center justify-center text-xl mb-4">
                                        <i class="fa-solid fa-camera"></i>
                                    </div>
                                    <p class="text-sm text-zinc-500 font-medium">Salve esta tela para lembrar da decisão de vocês.</p>
                                </div>
                            </div>
                        </div>

                        {/* Bottom Actions */}
                        <div class="mt-8 flex gap-4 animate-slide-up" style={{animationDelay: '0.2s'}}>
                            <button 
                                onClick={() => {
                                    setGameState('setup_question');
                                    setCurrentQuestion('');
                                    setCurrentCategory(null);
                                    setPrinciples([]);
                                    setPrincipleText('');
                                    setScriptureText('');
                                    setSelectedTeamId('');
                                }}
                                class="bg-white border border-zinc-200 hover:border-zinc-300 text-zinc-600 hover:text-zinc-900 font-bold py-3 px-6 rounded-full shadow-sm transition-all active:scale-95 text-sm"
                            >
                                Nova Pergunta
                            </button>
                            <button 
                                onClick={() => window.location.reload()}
                                class="bg-zinc-100 hover:bg-zinc-200 text-zinc-600 hover:text-zinc-900 font-bold py-3 px-6 rounded-full transition-all active:scale-95 text-sm"
                            >
                                Encerrar
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div class="relative antialiased">
                    {/* Floating Toast Notification */}
                    {message && (
                        <div class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 animate-slide-up">
                            <div class={`px-6 py-4 rounded-2xl shadow-float font-bold text-sm flex items-center gap-3 text-white border border-white/20 backdrop-blur-md
                                ${message.type === 'error' ? 'bg-rose-500/90' : message.type === 'warning' ? 'bg-amber-500/90' : 'bg-emerald-500/90'}
                            `}>
                                <i class={`fa-solid ${message.type === 'error' ? 'fa-circle-exclamation' : 'fa-info-circle'}`}></i>
                                {message.text}
                            </div>
                        </div>
                    )}

                    {/* Game State Router */}
                    {gameState === 'intro' && renderIntro()}
                    {gameState === 'setup_teams' && renderSetupTeams()}
                    {gameState === 'setup_question' && renderSetupQuestion()}
                    {gameState === 'brainstorm' && renderBrainstorm()}
                    {gameState === 'sorting' && renderSorting()}
                    {gameState === 'top3' && renderTop3()}
                    {gameState === 'result' && renderResult()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
